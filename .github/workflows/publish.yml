name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate package
        run: |
          node bin/cli.js --help
          node -e "require('./src/environments'); require('./src/transformer'); require('./src/installer'); require('./src/version-check'); console.log('All modules load successfully')"

      - name: Validate commands
        run: |
          node bin/cli.js --list --env claude
          echo "Commands validated"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build changelog for release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ -f ".changelog/${VERSION}.md" ]; then
            echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
            cat ".changelog/${VERSION}.md" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          elif [ -f .changelog/NEXT.md ]; then
            echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
            cat .changelog/NEXT.md >> "$GITHUB_OUTPUT"
            echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: true
